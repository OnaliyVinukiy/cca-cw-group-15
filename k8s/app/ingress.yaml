apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: app
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 20.219.232.39.nip.io
      secretName: techsalary-tls
  rules:
  - host: 20.219.232.39.nip.io
    http:
      paths:
        # BFF Service - /api/* (no rewrite)
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: bff-service
              port:
                number: 8000
        # Frontend - catch all other paths
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80