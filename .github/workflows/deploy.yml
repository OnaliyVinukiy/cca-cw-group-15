name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.sha }} 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Docker Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login techsalaryscale.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and Push Identity Service
        run: |
          docker build -t techsalaryscale.azurecr.io/identity_service:${{ github.sha }} \
            -f backend/identity_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/identity_service:${{ github.sha }}

      - name: Build and Push Salary Service
        run: |
          docker build -t techsalaryscale.azurecr.io/salary_service:${{ github.sha }} \
            -f backend/salary_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/salary_service:${{ github.sha }}
      
      - name: Build and Push Search Service
        run: |
          docker build -t techsalaryscale.azurecr.io/search_service:${{ github.sha }} \
            -f backend/search_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/search_service:${{ github.sha }}

      - name: Build and Push Stats Service
        run: |
          docker build -t techsalaryscale.azurecr.io/stats_service:${{ github.sha }} \
            -f backend/stats_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/stats_service:${{ github.sha }}

      - name: Build and Push Vote Service
        run: |
          docker build -t techsalaryscale.azurecr.io/vote_service:${{ github.sha }} \
            -f backend/vote_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/vote_service:${{ github.sha }}

      - name: Build and Push BFF Service
        run: |
          docker build -t techsalaryscale.azurecr.io/bff_service:${{ github.sha }} \
            -f backend/bff_service/Dockerfile ./backend
          docker push techsalaryscale.azurecr.io/bff_service:${{ github.sha }}

      - name: Build and Push Frontend
        run: |
          docker build -t techsalaryscale.azurecr.io/frontend:${{ github.sha }} \
            -f frontend/Dockerfile ./frontend
          docker push techsalaryscale.azurecr.io/frontend:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags in YAMLs
        run: |
          SHA=${{ github.sha }}
          sed -i "s|image: techsalaryscale.azurecr.io/identity_service:.*|image: techsalaryscale.azurecr.io/identity_service:$SHA|g" k8s/app/identity-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/salary_service:.*|image: techsalaryscale.azurecr.io/salary_service:$SHA|g" k8s/app/salary-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/search_service:.*|image: techsalaryscale.azurecr.io/search_service:$SHA|g" k8s/app/search-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/stats_service:.*|image: techsalaryscale.azurecr.io/stats_service:$SHA|g" k8s/app/stats-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/vote_service:.*|image: techsalaryscale.azurecr.io/vote_service:$SHA|g" k8s/app/vote-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/bff_service:.*|image: techsalaryscale.azurecr.io/bff_service:$SHA|g" k8s/app/bff-service-deployment.yaml
          sed -i "s|image: techsalaryscale.azurecr.io/frontend:.*|image: techsalaryscale.azurecr.io/frontend:$SHA|g" k8s/app/frontend-deployment.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add k8s/app/*.yaml
          git commit -m "chore: update image tags to $SHA [skip ci]"
          git push